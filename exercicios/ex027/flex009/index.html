<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        .father{
            background-color: darkblue;
            
            display: flex;
            flex-flow: row wrap;
        }
        .son{
            background-color: blue;
            color: white;
            border: 1px solid darkblue;
            text-align: center;

            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <h1>Flexbox test</h1>
    <div class="father">
        <div class="son">I</div>
        <div class="son">Normal space</div>
        <div class="son">III</div>
        <div class="son">More than Normal sapace</div>
        <div class="son">V</div>
        <div class="son">A litle big, but not so much</div>
        <div class="son">VII</div>
        <div class="son">Big, but, not like the next step</div>
        <div class="son">IX</div>
        <div class="son">Big, so big, more big than anothers, the biggest step ever!</div>
    </div>
</body>
</html>
