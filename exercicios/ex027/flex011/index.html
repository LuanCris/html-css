<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        .father{
            background-color: darkblue;
            
            display: flex;

            border-radius: 2%;

            flex-flow: nowrap;
        }
        .son{
            
        }
        #Tobey{
            background-color: red;
            color: white;
            border: 1px solid darkblue;
            text-align: center;
            margin: 5px 5px ;
            padding: 10px;

            flex-basis: 200px;
            flex-shrink: 4;
            flex-grow: 1;

            flex: row nowrap;
        }
        #Andrew{
            background-color: red;
            color: white;
            border: 1px solid darkblue;
            text-align: center;
            margin: 5px 5px ;
            padding: 10px;

            flex-basis: 200px;
            flex-shrink: 3;
            flex-grow: 2;

            flex: row nowrap;
        }
        #Tom{
            background-color: red;
            color: white;
            border: 1px solid darkblue;
            text-align: center;
            margin: 5px 5px ;
            padding: 10px;

            flex-basis: 200px;
            flex-shrink: 2;
            flex-grow: 3;

            flex: row nowrap;
        }
    </style>
</head>
<body>
    <h1>Flexbox test</h1>
    <h2>blending flex shrink and grow</h2>
    <div class="father">
        <div class="son" id="Tobey">I</div>
        <div class="son" id="Andrew">II</div>
        <div class="son" id="Tom">III</div>
        
    </div>
</body>
</html>
