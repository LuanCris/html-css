<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid layout third ex</title>
    <style>
        .container {
            display: grid;
            border: 2px solid rgba(255, 0, 0, 0.619);
            grid-template-rows: repeat(3, 100px);
            grid-template-columns:120px 20% repeat(2, 1fr);
            grid-auto-columns: 120px;
            grid-auto-rows: 100px;
            grid-auto-flow: column;
            gap: 5px;
            place-items: normal normal;
            place-content: normal normal;
        }
        .item {
            background-color: rgb(138, 185, 255);
            
            border: 2px solid rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <h1>Grid Layout Third Example (container)</h1>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
        <div class="item">I</div>
        <div class="item">J</div>
        <div class="item">K</div>
        <div class="item">L</div>
    </div>
</body>
</html>
